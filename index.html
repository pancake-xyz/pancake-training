<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Sub-20 5K</title>
<style>
/* ── FONTS ── loaded inline so no flash of unstyled text */
@import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;900&family=Literata:ital,wght@0,400;0,500;1,400&display=swap');

/* ── RESET ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; }

/* ── BASE ── all colours hardcoded, no CSS variables on critical elements */
body {
background-color: #080c10;
color: #e8edf5;
font-family: ‘Literata’, Georgia, ‘Times New Roman’, serif;
font-size: 15px;
line-height: 1.5;
overflow-x: hidden;
/* push content below fixed header — JS will set exact value after measuring */
padding-top: 90px;
}

/* ── HEADER ── fixed, measured by JS to set body padding-top */
#appHeader {
position: fixed;
top: 0; left: 0; right: 0;
z-index: 999;
background-color: #0d1117;
border-bottom: 1px solid #1e2535;
padding: 10px 16px 0;
}
.header-top {
display: flex;
align-items: center;
justify-content: space-between;
gap: 12px;
margin-bottom: 8px;
}
.brand-title {
font-family: ‘Barlow Condensed’, ‘Arial Narrow’, Arial, sans-serif;
font-weight: 900;
font-size: 1.5rem;
letter-spacing: 3px;
line-height: 1;
color: #3dffa0;
}
.brand-sub {
font-family: ‘Barlow Condensed’, ‘Arial Narrow’, Arial, sans-serif;
font-size: 0.6rem;
color: #5a6a85;
letter-spacing: 1.5px;
text-transform: uppercase;
margin-top: 2px;
}
.header-right {
display: flex;
align-items: center;
gap: 10px;
flex-shrink: 0;
}
.countdown-days {
font-family: ‘Barlow Condensed’, ‘Arial Narrow’, Arial, sans-serif;
font-size: 1.3rem;
font-weight: 700;
color: #ffe44a;
line-height: 1;
text-align: right;
}
.countdown-lbl {
font-family: ‘Barlow Condensed’, ‘Arial Narrow’, Arial, sans-serif;
font-size: 0.55rem;
color: #5a6a85;
text-transform: uppercase;
letter-spacing: 1px;
text-align: right;
}
.ring-wrap { width: 44px; height: 44px; flex-shrink: 0; }
.ring-wrap svg { width: 44px; height: 44px; display: block; }
.ring-bg { fill: none; stroke: #252d3e; stroke-width: 4; }
.ring-bar { fill: none; stroke: #3dffa0; stroke-width: 4; stroke-linecap: round; transform: rotate(-90deg); transform-origin: 50% 50%; transition: stroke-dashoffset 0.5s ease; }
.ring-label { font-family: ‘Barlow Condensed’, ‘Arial Narrow’, Arial, sans-serif; font-size: 10px; font-weight: 700; fill: #3dffa0; dominant-baseline: middle; text-anchor: middle; }

/* ── TABS ── */
.tabs {
display: flex;
border-top: 1px solid #1e2535;
margin: 0 -16px;
}
.tab {
flex: 1;
padding: 9px 4px;
text-align: center;
font-family: ‘Barlow Condensed’, ‘Arial Narrow’, Arial, sans-serif;
font-size: 0.73rem;
font-weight: 700;
letter-spacing: 1.5px;
text-transform: uppercase;
color: #5a6a85;
background: none;
border: none;
border-bottom: 2px solid transparent;
cursor: pointer;
transition: color 0.15s, border-color 0.15s;
}
.tab.active { color: #3dffa0; border-bottom-color: #3dffa0; }

/* ── MAIN ── */
main {
max-width: 540px;
margin: 0 auto;
padding: 14px 14px 80px;
}
.view { display: none; }
.view.active { display: block; }

/* ── STAT STRIP ── */
.stat-strip {
display: grid;
grid-template-columns: repeat(4, 1fr);
gap: 8px;
margin-bottom: 16px;
}
.stat-box {
background-color: #111620;
border: 1px solid #1e2535;
border-radius: 10px;
padding: 10px 6px;
text-align: center;
}
.stat-val {
font-family: ‘Barlow Condensed’, ‘Arial Narrow’, Arial, sans-serif;
font-size: 1.6rem;
font-weight: 700;
color: #3dffa0;
line-height: 1;
display: block;
}
.stat-lbl {
font-family: ‘Barlow Condensed’, ‘Arial Narrow’, Arial, sans-serif;
font-size: 0.58rem;
color: #5a6a85;
text-transform: uppercase;
letter-spacing: 0.8px;
margin-top: 2px;
display: block;
}

/* ── PHASE HEADER ── */
.phase-header {
display: flex;
align-items: center;
gap: 8px;
margin: 18px 0 8px;
}
.phase-pip { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.phase-lbl {
font-family: ‘Barlow Condensed’, ‘Arial Narrow’, Arial, sans-serif;
font-size: 0.68rem;
font-weight: 700;
letter-spacing: 2px;
text-transform: uppercase;
}
.phase-rule { flex: 1; height: 1px; background-color: #1e2535; }

/* ── WEEK ROW ── */
.week-row {
display: flex;
align-items: center;
gap: 10px;
padding: 12px;
background-color: #111620;
border: 1px solid #1e2535;
border-radius: 10px;
margin-bottom: 6px;
cursor: pointer;
position: relative;
overflow: hidden;
transition: border-color 0.15s;
-webkit-user-select: none;
user-select: none;
}
.week-row:active { background-color: #161c28; }
.week-row.wk-current { border-color: #3dffa0; }
.week-row.wk-current::before {
content: ‘’;
position: absolute;
left: 0; top: 0; bottom: 0;
width: 3px;
background-color: #3dffa0;
}
.week-row.wk-done { background-color: #0a1a12; border-color: #1e3a28; }
.wk-num {
font-family: ‘Barlow Condensed’, ‘Arial Narrow’, Arial, sans-serif;
font-size: 1.2rem;
font-weight: 700;
color: #3a4a60;
min-width: 28px;
flex-shrink: 0;
}
.week-row.wk-current .wk-num { color: #3dffa0; }
.week-row.wk-done .wk-num { color: #3dffa0; opacity: 0.5; }
.wk-info { flex: 1; min-width: 0; }
.wk-focus {
font-size: 0.85rem;
font-weight: 500;
color: #e8edf5;
white-space: nowrap;
overflow: hidden;
text-overflow: ellipsis;
}
.wk-date {
font-family: ‘Barlow Condensed’, ‘Arial Narrow’, Arial, sans-serif;
font-size: 0.65rem;
color: #5a6a85;
margin-top: 2px;
}
.wk-right {
display: flex;
flex-direction: column;
align-items: flex-end;
gap: 5px;
flex-shrink: 0;
}
.wk-km {
font-family: ‘Barlow Condensed’, ‘Arial Narrow’, Arial, sans-serif;
font-size: 0.78rem;
font-weight: 600;
color: #5a6a85;
}
.wk-dots { display: flex; gap: 4px; }
.dot {
width: 8px; height: 8px;
border-radius: 50%;
border: 1.5px solid #252d3e;
background-color: transparent;
}
.dot.d-interval { border-color: #ff7c3a; }
.dot.d-tempo    { border-color: #5b9fff; }
.dot.d-easy     { border-color: #2a5a40; }
.dot.d-long     { border-color: #ffe44a; }
.dot.d-race     { border-color: #ff4a6a; }
.dot.d-done     { background-color: #3dffa0; border-color: #3dffa0; }
.wk-arrow { color: #3a4a60; font-size: 1.1rem; flex-shrink: 0; }
.recovery-badge {
display: inline-block;
font-family: ‘Barlow Condensed’, ‘Arial Narrow’, Arial, sans-serif;
font-size: 0.58rem;
font-weight: 700;
letter-spacing: 1px;
text-transform: uppercase;
padding: 2px 6px;
border-radius: 4px;
background-color: #1a2535;
color: #5b9fff;
border: 1px solid #253550;
margin-left: 5px;
vertical-align: middle;
}

/* ── WEEK DETAIL ── */
.back-btn {
display: inline-flex;
align-items: center;
gap: 4px;
background: none;
border: none;
color: #5a6a85;
font-family: ‘Barlow Condensed’, ‘Arial Narrow’, Arial, sans-serif;
font-size: 0.85rem;
font-weight: 700;
letter-spacing: 1px;
text-transform: uppercase;
cursor: pointer;
padding: 0;
margin-bottom: 12px;
}
.week-nav {
display: flex;
justify-content: space-between;
align-items: center;
margin-bottom: 12px;
gap: 8px;
}
.nav-btn {
background-color: #111620;
border: 1px solid #1e2535;
color: #e8edf5;
font-family: ‘Barlow Condensed’, ‘Arial Narrow’, Arial, sans-serif;
font-size: 0.8rem;
font-weight: 700;
letter-spacing: 1px;
text-transform: uppercase;
padding: 8px 14px;
border-radius: 8px;
cursor: pointer;
flex-shrink: 0;
}
.nav-btn:disabled { opacity: 0.2; pointer-events: none; }
.nav-lbl {
font-family: ‘Barlow Condensed’, ‘Arial Narrow’, Arial, sans-serif;
font-size: 0.9rem;
font-weight: 700;
letter-spacing: 2px;
color: #5a6a85;
text-transform: uppercase;
text-align: center;
}

/* ── WEEK SUMMARY CARD ── */
.week-summary {
background-color: #111620;
border: 1px solid #1e2535;
border-radius: 14px;
padding: 16px;
margin-bottom: 10px;
}
.ws-top {
display: flex;
align-items: flex-start;
justify-content: space-between;
gap: 10px;
margin-bottom: 10px;
}
.ws-phase {
font-family: ‘Barlow Condensed’, ‘Arial Narrow’, Arial, sans-serif;
font-size: 0.62rem;
font-weight: 700;
letter-spacing: 2px;
text-transform: uppercase;
margin-bottom: 3px;
}
.ws-title {
font-family: ‘Barlow Condensed’, ‘Arial Narrow’, Arial, sans-serif;
font-size: 1.7rem;
font-weight: 900;
letter-spacing: 1px;
line-height: 1;
color: #e8edf5;
}
.ws-date {
font-family: ‘Barlow Condensed’, ‘Arial Narrow’, Arial, sans-serif;
font-size: 0.68rem;
color: #5a6a85;
margin-top: 4px;
}
.ws-km { text-align: right; flex-shrink: 0; }
.ws-km-val {
font-family: ‘Barlow Condensed’, ‘Arial Narrow’, Arial, sans-serif;
font-size: 2.2rem;
font-weight: 900;
color: #ffe44a;
line-height: 1;
}
.ws-km-lbl {
font-family: ‘Barlow Condensed’, ‘Arial Narrow’, Arial, sans-serif;
font-size: 0.58rem;
color: #5a6a85;
text-transform: uppercase;
letter-spacing: 1px;
}
.coach-note {
font-size: 0.8rem;
color: #b0bcd0;
line-height: 1.65;
font-style: italic;
padding-top: 10px;
border-top: 1px solid #1e2535;
}
.coach-note strong { font-style: normal; color: #3dffa0; font-weight: 600; }

/* ── KM PILLS ── */
.km-pills {
display: flex;
gap: 6px;
flex-wrap: wrap;
margin-bottom: 10px;
}
.km-pill {
font-family: ‘Barlow Condensed’, ‘Arial Narrow’, Arial, sans-serif;
font-size: 0.7rem;
font-weight: 600;
padding: 4px 10px;
border-radius: 20px;
background-color: #161c28;
border: 1px solid #252d3e;
color: #5a6a85;
}
.km-pill.done { color: #3dffa0; border-color: #1e4a30; background-color: #0a1a12; }

/* ── INJURY FLAG ── */
.injury-flag {
display: flex;
gap: 10px;
align-items: flex-start;
background-color: #1a0e0a;
border: 1px solid #4a2020;
border-left: 3px solid #ff4a6a;
border-radius: 10px;
padding: 10px 12px;
margin-bottom: 10px;
}
.flag-icon { font-size: 1rem; flex-shrink: 0; margin-top: 1px; }
.flag-text { font-size: 0.75rem; color: #ffb0b8; line-height: 1.55; }
.flag-text strong { color: #ff4a6a; font-style: normal; }

/* ── SESSION CARD ── */
.session-card {
background-color: #111620;
border: 1px solid #1e2535;
border-radius: 12px;
padding: 14px;
margin-bottom: 8px;
}
.session-card.s-done {
background-color: #0a1a12;
border-color: #1e3a28;
opacity: 0.82;
}
.session-card.s-optional { border-style: dashed; border-color: #252d3e; }
.s-row { display: flex; align-items: flex-start; gap: 10px; }
.s-body { flex: 1; min-width: 0; }
.s-badges { display: flex; align-items: center; gap: 6px; margin-bottom: 6px; flex-wrap: wrap; }
.s-badge {
font-family: ‘Barlow Condensed’, ‘Arial Narrow’, Arial, sans-serif;
font-size: 0.62rem;
font-weight: 700;
letter-spacing: 1px;
text-transform: uppercase;
padding: 2px 8px;
border-radius: 4px;
}
.badge-interval { background-color: #2a1a0a; color: #ff7c3a; border: 1px solid #4a2a10; }
.badge-tempo    { background-color: #0a1525; color: #5b9fff; border: 1px solid #152540; }
.badge-easy     { background-color: #0a1a12; color: #3dffa0; border: 1px solid #153525; }
.badge-long     { background-color: #1a1800; color: #ffe44a; border: 1px solid #3a3500; }
.badge-race     { background-color: #1a0a10; color: #ff4a6a; border: 1px solid #3a1020; }
.badge-opt {
font-family: ‘Barlow Condensed’, ‘Arial Narrow’, Arial, sans-serif;
font-size: 0.6rem;
font-weight: 600;
letter-spacing: 1px;
text-transform: uppercase;
color: #5a6a85;
border: 1px solid #252d3e;
padding: 2px 6px;
border-radius: 4px;
background-color: transparent;
}
.s-day {
font-family: ‘Barlow Condensed’, ‘Arial Narrow’, Arial, sans-serif;
font-size: 0.63rem;
color: #5a6a85;
letter-spacing: 1px;
text-transform: uppercase;
margin-bottom: 3px;
}
.s-workout {
font-size: 0.88rem;
font-weight: 500;
color: #e8edf5;
line-height: 1.4;
}
.session-card.s-done .s-workout {
text-decoration: line-through;
color: #5a6a85;
}
.s-km {
font-family: ‘Barlow Condensed’, ‘Arial Narrow’, Arial, sans-serif;
font-size: 0.65rem;
color: #5a6a85;
margin-top: 4px;
}
.tick-btn {
width: 32px; height: 32px;
border-radius: 50%;
border: 2px solid #252d3e;
background-color: transparent;
cursor: pointer;
display: flex;
align-items: center;
justify-content: center;
font-size: 0.9rem;
color: #5a6a85;
flex-shrink: 0;
transition: all 0.15s;
-webkit-appearance: none;
}
.tick-btn.ticked {
background-color: #3dffa0;
border-color: #3dffa0;
color: #080c10;
font-weight: 700;
}
.s-tip {
margin-top: 10px;
padding-top: 10px;
border-top: 1px solid #1e2535;
font-size: 0.75rem;
color: #5a6a85;
line-height: 1.6;
font-style: italic;
}
.s-tip::before { content: ’💡 ’; font-style: normal; }

/* ── GYM CARD ── */
.gym-card {
background-color: #0f1420;
border: 1px solid #1e2535;
border-radius: 12px;
padding: 14px;
margin-bottom: 8px;
}
.gym-head {
display: flex;
align-items: center;
gap: 8px;
margin-bottom: 10px;
}
.gym-head-title {
font-family: ‘Barlow Condensed’, ‘Arial Narrow’, Arial, sans-serif;
font-size: 0.88rem;
font-weight: 700;
letter-spacing: 1px;
text-transform: uppercase;
color: #5b9fff;
}
.gym-head-sub {
margin-left: auto;
font-family: ‘Barlow Condensed’, ‘Arial Narrow’, Arial, sans-serif;
font-size: 0.65rem;
color: #5a6a85;
}
.gym-sec {
font-family: ‘Barlow Condensed’, ‘Arial Narrow’, Arial, sans-serif;
font-size: 0.6rem;
font-weight: 700;
letter-spacing: 1.5px;
text-transform: uppercase;
color: #3a4a60;
margin: 10px 0 5px;
padding-bottom: 3px;
border-bottom: 1px solid #1e2535;
}
.gym-item { margin-bottom: 6px; }
.gym-item-name {
font-size: 0.82rem;
font-weight: 500;
color: #e8edf5;
font-family: ‘Literata’, Georgia, serif;
}
.gym-item-detail {
font-size: 0.7rem;
color: #5a6a85;
margin-top: 1px;
font-family: ‘Literata’, Georgia, serif;
}

/* ── RACE BANNER ── */
.race-banner {
background-color: #1a0a10;
border: 1px solid #4a1020;
border-radius: 14px;
padding: 20px;
text-align: center;
margin-bottom: 8px;
}
.race-emoji { font-size: 2rem; display: block; margin-bottom: 6px; }
.race-title {
font-family: ‘Barlow Condensed’, ‘Arial Narrow’, Arial, sans-serif;
font-size: 2.2rem;
font-weight: 900;
letter-spacing: 4px;
color: #ff4a6a;
line-height: 1;
margin-bottom: 8px;
}
.race-sub {
font-size: 0.8rem;
color: #8a7a85;
line-height: 1.6;
margin-bottom: 14px;
}
.race-tick {
width: 46px; height: 46px;
border-radius: 50%;
border: 2px solid #4a1020;
background-color: transparent;
cursor: pointer;
display: flex;
align-items: center;
justify-content: center;
font-size: 1.3rem;
color: #5a6a85;
margin: 0 auto;
-webkit-appearance: none;
}
.race-tick.ticked { background-color: #ff4a6a; border-color: #ff4a6a; color: white; }

/* ── PREHAB ── */
.prehab-intro {
background-color: #111620;
border: 1px solid #1e2535;
border-radius: 14px;
padding: 16px;
margin-bottom: 12px;
}
.prehab-intro h2 {
font-family: ‘Barlow Condensed’, ‘Arial Narrow’, Arial, sans-serif;
font-size: 1.4rem;
font-weight: 900;
letter-spacing: 1px;
color: #5b9fff;
margin-bottom: 6px;
}
.prehab-intro p { font-size: 0.8rem; color: #b0bcd0; line-height: 1.65; }
.prehab-sec-label {
font-family: ‘Barlow Condensed’, ‘Arial Narrow’, Arial, sans-serif;
font-size: 0.65rem;
font-weight: 700;
letter-spacing: 2px;
text-transform: uppercase;
color: #5a6a85;
margin: 16px 0 8px;
}
.ex-card {
background-color: #111620;
border: 1px solid #1e2535;
border-radius: 12px;
padding: 14px;
margin-bottom: 8px;
}
.ex-card-top {
display: flex;
align-items: flex-start;
gap: 10px;
margin-bottom: 8px;
}
.ex-icon {
font-size: 1.2rem;
width: 36px; height: 36px;
display: flex;
align-items: center;
justify-content: center;
background-color: #161c28;
border-radius: 8px;
flex-shrink: 0;
}
.ex-info { flex: 1; }
.ex-title { font-size: 0.88rem; font-weight: 500; color: #e8edf5; line-height: 1.3; }
.ex-sets {
font-family: ‘Barlow Condensed’, ‘Arial Narrow’, Arial, sans-serif;
font-size: 0.7rem;
color: #5b9fff;
font-weight: 600;
margin-top: 2px;
}
.ex-badge {
flex-shrink: 0;
font-family: ‘Barlow Condensed’, ‘Arial Narrow’, Arial, sans-serif;
font-size: 0.58rem;
font-weight: 700;
letter-spacing: 1px;
text-transform: uppercase;
padding: 2px 7px;
border-radius: 4px;
}
.ex-badge.critical { background-color: #2a0a10; color: #ff4a6a; }
.ex-badge.high     { background-color: #1a1800; color: #ffe44a; }
.ex-badge.daily    { background-color: #0a1a12; color: #3dffa0; }
.ex-why {
font-size: 0.75rem;
color: #5a6a85;
line-height: 1.6;
font-style: italic;
padding-top: 8px;
border-top: 1px solid #1e2535;
}
.ex-when {
font-family: ‘Barlow Condensed’, ‘Arial Narrow’, Arial, sans-serif;
font-size: 0.65rem;
color: #3a4a60;
margin-top: 5px;
}
.warn-box {
background-color: #1a0e0a;
border: 1px solid #4a2020;
border-radius: 12px;
padding: 14px;
margin-bottom: 12px;
}
.warn-box h3 {
font-family: ‘Barlow Condensed’, ‘Arial Narrow’, Arial, sans-serif;
font-size: 1rem;
font-weight: 700;
letter-spacing: 1px;
text-transform: uppercase;
color: #ff4a6a;
margin-bottom: 8px;
}
.warn-item {
display: flex;
gap: 8px;
margin-bottom: 6px;
font-size: 0.78rem;
color: #ffb0b8;
line-height: 1.5;
}
.warn-item::before { content: ‘⚠’; flex-shrink: 0; }
.gym-sched {
background-color: #111620;
border: 1px solid #1e2535;
border-radius: 12px;
padding: 14px;
margin-bottom: 8px;
}
.gym-sched h3 {
font-family: ‘Barlow Condensed’, ‘Arial Narrow’, Arial, sans-serif;
font-size: 1rem;
font-weight: 700;
letter-spacing: 1px;
text-transform: uppercase;
color: #5b9fff;
margin-bottom: 10px;
}
.gs-day { margin-bottom: 10px; }
.gs-day-label {
font-family: ‘Barlow Condensed’, ‘Arial Narrow’, Arial, sans-serif;
font-size: 0.72rem;
font-weight: 700;
letter-spacing: 1.5px;
text-transform: uppercase;
color: #ffe44a;
margin-bottom: 4px;
}
.gs-day-items { font-size: 0.78rem; color: #b0bcd0; line-height: 1.8; }
</style>

</head>
<body>

<header id="appHeader">
  <div class="header-top">
    <div>
      <div class="brand-title">Sub-20 5K</div>
      <div class="brand-sub">18 Weeks · 4 Sessions · Injury Smart</div>
    </div>

   when:'Tue & Thu gym sessions. Already fits your full-body format.'},
  {icon:'💪', title:'Tibialis Anterior Band Work', sets:'3\u00d715 reps per leg', priority:'high', lab:'High Priority',
   why:'Balances the calf complex, directly reduces shin splint risk, and helps control foot landing. Sit in a chair, band over foot, lift foot upward (dorsiflexion) against resistance.',
   when:'Friday gym session \u2014 perfect fit for your "everything else" day.'},
  {icon:'🧘', title:'Soleus Stretch \u2014 Bent Knee', sets:'3\u00d745 seconds \u00b7 each side', priority:'daily', lab:'Daily',
   why:'The soleus is chronically tight in runners and directly increases Achilles tendon load. Unlike the standard calf stretch, this targets the soleus specifically.',
   when:'Daily, especially before bed. Back foot close to wall, bend back knee toward wall keeping heel flat.'},
  {icon:'🧘', title:'Gastrocnemius Stretch \u2014 Straight Leg', sets:'3\u00d745 seconds \u00b7 each side', priority:'daily', lab:'Daily',
   why:'Maintains length in the gastrocnemius, reducing Achilles load across the full range of motion. Do both stretches together every day.',
   when:'Daily. Classic wall stretch \u2014 straight back leg, heel flat, lean forward into wall.'}
];

// ── STATE ──
var completed = {};
try { var s = localStorage.getItem('sub20v5'); if (s) completed = JSON.parse(s); } catch(e) {}
function save() { try { localStorage.setItem('sub20v5', JSON.stringify(completed)); } catch(e) {} }
function sKey(wn, si) { return 'w'+wn+'s'+si; }
function isDone(wn, si) { return completed[sKey(wn,si)] === true; }
function toggle(wn, si) {
  var k = sKey(wn,si);
  if (isDone(wn,si)) { delete completed[k]; } else { completed[k] = true; }
  save(); updateRing(); render();
}
function totalSessions() { return WEEKS.reduce(function(a,w){ return a+w.sessions.length; }, 0); }
function doneSessions()  { return Object.keys(completed).filter(function(k){ return completed[k]===true; }).length; }
function currentWeek() {
  for (var i=0; i<WEEKS.length; i++) {
    var allDone = WEEKS[i].sessions.every(function(_,si){ return isDone(i+1,si); });
    if (!allDone) return i+1;
  }
  return 18;
}

// ── RING & COUNTDOWN ──
function updateRing() {
  var pct = Math.round(doneSessions()/totalSessions()*100);
  var circ = 113.1;
  document.getElementById('ringBar').style.strokeDashoffset = circ - circ*pct/100;
  document.getElementById('ringPct').textContent = pct+'%';
}
function updateCountdown() {
  var diff = Math.ceil((RACE - new Date()) / 86400000);
  document.getElementById('daysLeft').textContent = diff > 0 ? diff : '\uD83C\uDFC1';
}

// ── TAB SWITCHING ──
var activeTab = 'overview';
var selWeek = null;

function switchTab(tab, wn) {
  activeTab = tab;
  if (wn) selWeek = wn;
  if (tab === 'week' && !selWeek) selWeek = currentWeek();
  document.querySelectorAll('.tab').forEach(function(t,i) {
    t.classList.toggle('active', ['overview','week','prehab'][i] === tab);
  });
  ['overview','week','prehab'].forEach(function(t) {
    document.getElementById('tab-'+t).classList.toggle('active', t===tab);
  });
  // scroll to top on tab switch
  window.scrollTo(0,0);
  render();
}

function render() {
  if (activeTab==='overview') renderOverview();
  else if (activeTab==='week') renderWeek(selWeek);
  else renderPrehab();
}

// ── OVERVIEW ──
function renderOverview() {
  var cw = currentWeek();
  var html = '<div class="stat-strip">'
    + '<div class="stat-box"><span class="stat-val">'+doneSessions()+'</span><span class="stat-lbl">Done</span></div>'
    + '<div class="stat-box"><span class="stat-val">'+cw+'</span><span class="stat-lbl">Week</span></div>'
    + '<div class="stat-box"><span class="stat-val">'+Math.max(0,19-cw)+'</span><span class="stat-lbl">Left</span></div>'
    + '<div class="stat-box"><span class="stat-val">18</span><span class="stat-lbl">Total</span></div>'
    + '</div>';

  var lastPhase = '';
  WEEKS.forEach(function(w) {
    if (w.phase !== lastPhase) {
      var p = PHASES[w.phase];
      html += '<div class="phase-header">'
        + '<div class="phase-pip" style="background-color:'+p.color+'"></div>'
        + '<span class="phase-lbl" style="color:'+p.color+'">'+p.label+'</span>'
        + '<div class="phase-rule"></div></div>';
      lastPhase = w.phase;
    }
    var allDone = w.sessions.every(function(_,si){ return isDone(w.n,si); });
    var isCur = w.n === currentWeek() && !allDone;
    var dots = w.sessions.map(function(s,si) {
      var d = isDone(w.n,si) ? ' d-done' : '';
      return '<div class="dot d-'+s.type+d+'"></div>';
    }).join('');
    var rec = w.cutback ? '<span class="recovery-badge">Recovery</span>' : '';
    html += '<div class="week-row'+(allDone?' wk-done':'')+(isCur?' wk-current':'')+'" onclick="switchTab(\'week\','+w.n+')">'
      + '<div class="wk-num">'+(w.n<10?'0':'')+w.n+'</div>'
      + '<div class="wk-info"><div class="wk-focus">'+w.focus+rec+'</div><div class="wk-date">'+weekRange(w.n)+'</div></div>'
      + '<div class="wk-right"><div class="wk-km">'+w.totalKm+' km</div><div class="wk-dots">'+dots+'</div></div>'
      + '<div class="wk-arrow">\u203a</div>'
      + '</div>';
  });
  document.getElementById('tab-overview').innerHTML = html;
}

// ── WEEK DETAIL ──
function renderWeek(wn) {
  var w = WEEKS[wn-1];
  var pc = PHASES[w.phase].color;
  var pl = PHASES[w.phase].label;

  var pills = w.sessions.map(function(s,si) {
    var d = isDone(wn,si);
    return '<div class="km-pill'+(d?' done':'')+'">'+s.day.slice(0,3)+': '+s.km+'km</div>';
  }).join('');

  var html = '<button class="back-btn" onclick="switchTab(\'overview\')">\u2039 All Weeks</button>'
    + '<div class="week-nav">'
    + '<button class="nav-btn" onclick="switchTab(\'week\','+(wn-1)+')" '+(wn===1?'disabled':'')+'">\u2039 Prev</button>'
    + '<div class="nav-lbl">Week '+wn+' / 18</div>'
    + '<button class="nav-btn" onclick="switchTab(\'week\','+(wn+1)+')" '+(wn===18?'disabled':'')+'">Next \u203a</button>'
    + '</div>'
    + '<div class="week-summary">'
    + '<div class="ws-top">'
    + '<div><div class="ws-phase" style="color:'+pc+'">'+pl+(w.cutback?' \u00b7 Recovery':'')+'</div>'
    + '<div class="ws-title">'+w.focus+'</div>'
    + '<div class="ws-date">'+weekRange(wn)+'</div></div>'
    + '<div class="ws-km"><div class="ws-km-val">'+w.totalKm+'</div><div class="ws-km-lbl">km target</div></div>'
    + '</div>'
    + '<div class="coach-note">'+w.note+'</div>'
    + '</div>'
    + '<div class="km-pills">'+pills+'</div>';

  if (w.injuryFlag) {
    html += '<div class="injury-flag"><div class="flag-icon">\u26a0\ufe0f</div><div class="flag-text">'+w.injuryFlag+'</div></div>';
  }

  w.sessions.forEach(function(s,si) {
    var done = isDone(wn,si);
    if (s.type === 'race') {
      html += '<div class="race-banner">'
        + '<span class="race-emoji">\uD83C\uDFC1</span>'
        + '<div class="race-title">RACE DAY</div>'
        + '<div class="race-sub">'+s.workout+'<br><br>'+s.tip+'</div>'
        + '<button class="race-tick'+(done?' ticked':'')+'" onclick="toggle('+wn+','+si+')">'+(done?'\u2713':'\u25cb')+'</button>'
        + '</div>';
      return;
    }
    var typeLabel = s.type==='long' ? 'long run' : s.type;
    var badgeType = s.type==='long' ? 'long' : s.type;
    var optBadge = s.optional ? '<span class="badge-opt">Optional</span>' : '';
    html += '<div class="session-card'+(done?' s-done':'')+(s.optional?' s-optional':'')+'">'
      + '<div class="s-row">'
      + '<div class="s-body">'
      + '<div class="s-badges"><span class="s-badge badge-'+badgeType+'">'+typeLabel+'</span>'+optBadge+'</div>'
      + '<div class="s-day">'+s.day+'</div>'
      + '<div class="s-workout">'+s.workout+'</div>'
      + '<div class="s-km">~'+s.km+' km this session</div>'
      + '</div>'
      + '<button class="tick-btn'+(done?' ticked':'')+'" onclick="toggle('+wn+','+si+')">'+(done?'\u2713':'\u25cb')+'</button>'
      + '</div>'
      + '<div class="s-tip">'+s.tip+'</div>'
      + '</div>';
  });

  html += '<div class="gym-card">'
    + '<div class="gym-head"><span>💪</span><span class="gym-head-title">Gym & Prehab This Week</span>'
    + '<span class="gym-head-sub">'+(w.phase==='taper'?'Reduce weights 20%':'Full programme')+'</span></div>'
    + '<div class="gym-sec">Tuesday & Thursday \u2014 Full Body + Prehab</div>'
    + gymItem('Single-leg calf raises (straight + bent knee)','3\u00d715 each leg, slow tempo \u2014 non-negotiable')
    + gymItem('Tibialis posterior band work','3\u00d715 each leg \u2014 your single most important exercise')
    + gymItem('Single-leg Romanian deadlift','3\u00d710 each leg \u2014 posterior chain strength')
    + '<div class="gym-sec">Friday \u2014 Prehab Focus</div>'
    + gymItem('Tibialis anterior band work','3\u00d715 each leg \u2014 shin splint prevention')
    + gymItem('Foot doming / short foot exercise','10\u00d75s holds each foot \u2014 arch rebuilding')
    + '<div class="gym-sec">Daily \u2014 5 Minutes Every Day</div>'
    + gymItem('Soleus stretch (bent knee) + gastrocnemius stretch','3\u00d745s each side, each stretch \u2014 every single day')
    + gymItem('Tibialis posterior band work on sofa','3\u00d715 each leg \u2014 evening routine while watching TV')
    + '</div>';

  document.getElementById('tab-week').innerHTML = html;
}

function gymItem(name, detail) {
  return '<div class="gym-item"><div class="gym-item-name">'+name+'</div><div class="gym-item-detail">'+detail+'</div></div>';
}

// ── PREHAB TAB ──
function renderPrehab() {
  var html = '<div class="prehab-intro"><h2>Injury Prevention Plan</h2>'
    + '<p>Built around your specific history: posterior tibial tendon dysfunction and Achilles sensitivity. The post-tib band work and calf raises are non-negotiable \u2014 they\'re what gets you to the start line healthy.</p></div>'
    + '<div class="warn-box"><h3>\uD83D\uDD34 Stop Running If You Have...</h3>'
    + warnItem('Sharp or aching pain behind the medial malleolus (inner ankle bone) during or after a run')
    + warnItem('Pain that worsens during a run rather than warming up and settling within 5\u201310 minutes')
    + warnItem('Visible swelling around the inside of the ankle')
    + warnItem('Morning Achilles stiffness lasting more than 10\u201315 minutes')
    + warnItem('Post-tib tenderness that doesn\'t settle within 24 hours of a run')
    + '</div>';

  html += '<div class="prehab-sec-label">\uD83D\uDD34 Critical \u2014 Every Gym Session</div>';
  PREHAB.filter(function(e){return e.priority==='critical';}).forEach(function(e){ html+=exCard(e); });
  html += '<div class="prehab-sec-label">\uD83D\uDFE1 High Priority \u2014 Weekly</div>';
  PREHAB.filter(function(e){return e.priority==='high';}).forEach(function(e){ html+=exCard(e); });
  html += '<div class="prehab-sec-label">\uD83D\uDFE2 Daily \u2014 5 Minutes Every Day</div>';
  PREHAB.filter(function(e){return e.priority==='daily';}).forEach(function(e){ html+=exCard(e); });

  html += '<div class="gym-sched"><h3>\uD83D\uDCC5 Weekly Gym Integration</h3>'
    + '<div class="gs-day"><div class="gs-day-label">Tuesday & Thursday \u2014 Full Body</div>'
    + '<div class="gs-day-items">Your existing full-body session<br>+ Single-leg calf raises (straight) 3\u00d715<br>+ Single-leg calf raises (bent knee) 3\u00d715<br>+ Post-tib band work 3\u00d715<br>+ Single-leg RDL 3\u00d710</div></div>'
    + '<div class="gs-day"><div class="gs-day-label">Friday \u2014 Everything Else + Prehab</div>'
    + '<div class="gs-day-items">Your existing session<br>+ Tibialis anterior band work 3\u00d715<br>+ Foot doming 10\u00d75s holds<br>+ Soleus + gastroc stretches</div></div>'
    + '<div class="gs-day"><div class="gs-day-label">Daily \u2014 5 Minutes (Sofa/Morning)</div>'
    + '<div class="gs-day-items">Post-tib band work 3\u00d715 each leg<br>Soleus stretch 3\u00d745s each side<br>Gastrocnemius stretch 3\u00d745s each side<br>Foot doming 10\u00d75s each foot</div></div>'
    + '</div>';

  document.getElementById('tab-prehab').innerHTML = html;
}

function exCard(e) {
  return '<div class="ex-card"><div class="ex-card-top">'
    + '<div class="ex-icon">'+e.icon+'</div>'
    + '<div class="ex-info"><div class="ex-title">'+e.title+'</div><div class="ex-sets">'+e.sets+'</div></div>'
    + '<span class="ex-badge '+e.priority+'">'+e.lab+'</span>'
    + '</div>'
    + '<div class="ex-why">'+e.why+'</div>'
    + '<div class="ex-when">\uD83D\uDCC5 '+e.when+'</div>'
    + '</div>';
}
function warnItem(t) { return '<div class="warn-item">'+t+'</div>'; }

// ── INIT ──
updateRing();
updateCountdown();
setInterval(updateCountdown, 60000);
renderOverview();
</script>

</body>
</html>
