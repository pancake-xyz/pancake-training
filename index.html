<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Sub-20 5K</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Literata:ital,wght@0,300;0,400;0,500;1,300;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #080c10;
  --surface: #0d1117;
  --card: #111620;
  --card2: #161c28;
  --border: #1e2535;
  --border2: #252d3e;
  --green: #3dffa0;
  --yellow: #ffe44a;
  --orange: #ff7c3a;
  --blue: #5b9fff;
  --red: #ff4a6a;
  --text: #e8edf5;
  --muted: #5a6a85;
  --muted2: #3a4a60;
  --done-bg: #0a1a12;
  --warn-bg: #1a0e0a;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { background: var(--bg); color: var(--text); font-family: 'Literata', Georgia, serif; min-height: 100vh; overflow-x: hidden; font-size: 15px; }

.header { background: var(–surface); border-bottom: 1px solid var(–border); padding: 8px 16px 0; position: fixed; top: 0; left: 0; right: 0; z-index: 200; }
body { padding-top: 88px; }
.header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; gap: 12px; }
.brand h1 { font-family: ‘Barlow Condensed’, sans-serif; font-weight: 900; font-size: 1.5rem; letter-spacing: 3px; line-height: 1; color: var(–green); }
.brand p { font-size: 0.6rem; color: var(–muted); letter-spacing: 1.5px; text-transform: uppercase; margin-top: 1px; font-family: ‘Barlow Condensed’, sans-serif; }
.header-meta { display: flex; align-items: center; gap: 8px; }
.progress-wrap { position: relative; width: 42px; height: 42px; flex-shrink: 0; }
.progress-wrap svg { width: 42px; height: 42px; }
.ring-bg { fill: none; stroke: var(–border2); stroke-width: 3.5; }
.ring-bar { fill: none; stroke: var(–green); stroke-width: 3.5; stroke-linecap: round; transition: stroke-dashoffset 0.6s ease; transform: rotate(-90deg); transform-origin: 50% 50%; }
.ring-text { font-family: ‘Barlow Condensed’, sans-serif; font-size: 10px; font-weight: 700; fill: var(–green); dominant-baseline: middle; text-anchor: middle; }
.race-countdown { text-align: right; }
.race-countdown .days { font-family: ‘Barlow Condensed’, sans-serif; font-size: 1.2rem; font-weight: 700; color: var(–yellow); line-height: 1; }
.race-countdown .days-lbl { font-size: 0.55rem; color: var(–muted); text-transform: uppercase; letter-spacing: 1px; font-family: ‘Barlow Condensed’, sans-serif; }
.tabs { display: flex; border-top: 1px solid var(–border); margin: 0 -16px; }
.tab { flex: 1; padding: 8px 4px; text-align: center; font-family: ‘Barlow Condensed’, sans-serif; font-size: 0.72rem; font-weight: 600; letter-spacing: 1.2px; text-transform: uppercase; color: var(–muted); cursor: pointer; border: none; background: none; border-bottom: 2px solid transparent; transition: all 0.2s; }
.tab.active { color: var(–green); border-bottom-color: var(–green); }

main { padding: 14px 14px 80px; max-width: 560px; margin: 0 auto; }
html { scroll-padding-top: 90px; }
.view { display: none; }
.view.active { display: block; animation: fadeIn 0.2s ease; }
@keyframes fadeIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }

/* STAT STRIP */
.stat-strip { display: grid; grid-template-columns: repeat(4,1fr); gap: 8px; margin-bottom: 16px; }
.stat-box { background: var(–card); border: 1px solid var(–border); border-radius: 10px; padding: 10px 6px; text-align: center; }
.stat-box .v { font-family: ‘Barlow Condensed’, sans-serif; font-size: 1.5rem; font-weight: 700; color: var(–green); line-height: 1; }
.stat-box .l { font-size: 0.58rem; color: var(–muted); text-transform: uppercase; letter-spacing: 0.8px; margin-top: 2px; font-family: ‘Barlow Condensed’, sans-serif; }

/* PHASE HEADER */
.phase-header { display: flex; align-items: center; gap: 8px; margin: 18px 0 8px; }
.phase-pip { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
.phase-name { font-family: ‘Barlow Condensed’, sans-serif; font-size: 0.68rem; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; }
.phase-line { flex: 1; height: 1px; background: var(–border); }

/* WEEK ROW */
.week-row { display: flex; align-items: center; gap: 10px; padding: 11px 12px; background: var(–card); border: 1px solid var(–border); border-radius: 10px; margin-bottom: 5px; cursor: pointer; transition: border-color 0.2s; position: relative; overflow: hidden; }
.week-row.wk-done { background: var(–done-bg); border-color: rgba(61,255,160,0.2); }
.week-row.wk-current { border-color: var(–green); }
.week-row.wk-current::before { content:’’; position:absolute; left:0; top:0; bottom:0; width:3px; background:var(–green); border-radius:3px 0 0 3px; }
.wk-num { font-family: ‘Barlow Condensed’, sans-serif; font-size: 1.2rem; font-weight: 700; color: var(–muted2); min-width: 26px; }
.week-row.wk-current .wk-num { color: var(–green); }
.week-row.wk-done .wk-num { color: var(–green); opacity: 0.5; }
.wk-info { flex: 1; min-width: 0; }
.wk-focus { font-size: 0.82rem; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.wk-meta { font-size: 0.63rem; color: var(–muted); margin-top: 2px; font-family: ‘Barlow Condensed’, sans-serif; letter-spacing: 0.5px; }
.wk-right { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; flex-shrink: 0; }
.wk-km { font-family: ‘Barlow Condensed’, sans-serif; font-size: 0.78rem; font-weight: 600; color: var(–muted); }
.wk-dots { display: flex; gap: 3px; }
.dot { width: 7px; height: 7px; border-radius: 50%; border: 1.5px solid var(–border2); background: transparent; }
.dot.d-interval { border-color: var(–orange); }
.dot.d-tempo { border-color: var(–blue); }
.dot.d-easy { border-color: rgba(61,255,160,0.4); }
.dot.d-long { border-color: var(–yellow); }
.dot.d-race { border-color: var(–red); }
.dot.done { background: var(–green); border-color: var(–green); }
.wk-chevron { color: var(–muted2); font-size: 1rem; }
.cutback-badge { display: inline-block; font-family: ‘Barlow Condensed’, sans-serif; font-size: 0.58rem; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; padding: 2px 6px; border-radius: 4px; background: rgba(91,159,255,0.12); color: var(–blue); border: 1px solid rgba(91,159,255,0.2); margin-left: 6px; vertical-align: middle; }

/* WEEK DETAIL */
.back-btn { display: flex; align-items: center; gap: 5px; background: none; border: none; color: var(–muted); font-family: ‘Barlow Condensed’, sans-serif; font-size: 0.85rem; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; cursor: pointer; padding: 0; margin-bottom: 12px; transition: color 0.2s; }
.back-btn:hover { color: var(–green); }
.week-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
.nav-btn { background: var(–card); border: 1px solid var(–border); color: var(–text); font-family: ‘Barlow Condensed’, sans-serif; font-size: 0.8rem; font-weight: 600; letter-spacing: 1px; padding: 7px 14px; border-radius: 8px; cursor: pointer; transition: all 0.2s; text-transform: uppercase; }
.nav-btn:hover { border-color: var(–green); color: var(–green); }
.nav-btn:disabled { opacity: 0.25; pointer-events: none; }
.nav-label { font-family: ‘Barlow Condensed’, sans-serif; font-size: 0.9rem; font-weight: 700; letter-spacing: 2px; color: var(–muted); text-transform: uppercase; }

.week-summary { background: var(–card); border: 1px solid var(–border); border-radius: 14px; padding: 16px; margin-bottom: 12px; }
.ws-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; margin-bottom: 10px; }
.ws-phase { font-family: ‘Barlow Condensed’, sans-serif; font-size: 0.62rem; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 3px; }
.ws-title { font-family: ‘Barlow Condensed’, sans-serif; font-size: 1.7rem; font-weight: 900; letter-spacing: 1px; line-height: 1; }
.ws-date { font-family: ‘Barlow Condensed’, sans-serif; font-size: 0.68rem; color: var(–muted); margin-top: 3px; }
.ws-km-big { text-align: right; flex-shrink: 0; }
.km-val { font-family: ‘Barlow Condensed’, sans-serif; font-size: 2rem; font-weight: 900; color: var(–yellow); line-height: 1; }
.km-lbl { font-size: 0.58rem; color: var(–muted); font-family: ‘Barlow Condensed’, sans-serif; letter-spacing: 1px; text-transform: uppercase; }
.coach-note { font-size: 0.81rem; color: #c0c8d8; line-height: 1.65; padding-top: 10px; border-top: 1px solid var(–border); font-style: italic; }
.coach-note strong { font-style: normal; color: var(–green); font-weight: 500; }

.injury-flag { display: flex; gap: 8px; align-items: flex-start; background: var(–warn-bg); border: 1px solid rgba(255,76,106,0.25); border-left: 3px solid var(–red); border-radius: 10px; padding: 10px 12px; margin-bottom: 10px; }
.flag-icon { font-size: 1rem; flex-shrink: 0; margin-top: 1px; }
.flag-text { font-size: 0.75rem; color: #ffb0b8; line-height: 1.55; }
.flag-text strong { color: var(–red); font-style: normal; }

/* SESSION CARDS */
.session-card { background: var(–card); border: 1px solid var(–border); border-radius: 12px; padding: 14px; margin-bottom: 8px; }
.session-card.s-done { background: var(–done-bg); border-color: rgba(61,255,160,0.2); opacity: 0.8; }
.session-card.s-optional { border-style: dashed; }
.s-top { display: flex; align-items: flex-start; gap: 10px; }
.s-left { flex: 1; min-width: 0; }
.s-badge-row { display: flex; align-items: center; gap: 6px; margin-bottom: 5px; flex-wrap: wrap; }
.s-badge { font-family: ‘Barlow Condensed’, sans-serif; font-size: 0.6rem; font-weight: 700; letter-spacing: 1.2px; text-transform: uppercase; padding: 2px 7px; border-radius: 4px; }
.badge-interval { background: rgba(255,124,58,0.15); color: var(–orange); }
.badge-tempo { background: rgba(91,159,255,0.15); color: var(–blue); }
.badge-easy { background: rgba(61,255,160,0.1); color: var(–green); }
.badge-long { background: rgba(255,228,74,0.12); color: var(–yellow); }
.badge-race { background: rgba(255,76,106,0.15); color: var(–red); }
.badge-opt { font-family: ‘Barlow Condensed’, sans-serif; font-size: 0.58rem; letter-spacing: 1px; text-transform: uppercase; color: var(–muted); border: 1px solid var(–border2); padding: 1px 6px; border-radius: 4px; }
.s-day { font-family: ‘Barlow Condensed’, sans-serif; font-size: 0.63rem; color: var(–muted); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 3px; }
.s-workout { font-size: 0.88rem; font-weight: 500; line-height: 1.35; }
.session-card.s-done .s-workout { text-decoration: line-through; color: var(–muted); }
.s-km-row { font-family: ‘Barlow Condensed’, sans-serif; font-size: 0.65rem; color: var(–muted); margin-top: 3px; }
.tick-btn { width: 30px; height: 30px; border-radius: 50%; border: 2px solid var(–border2); background: transparent; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 0.85rem; transition: all 0.2s; flex-shrink: 0; color: var(–muted); }
.tick-btn:hover { border-color: var(–green); color: var(–green); }
.tick-btn.ticked { background: var(–green); border-color: var(–green); color: #080c10; font-weight: 700; }
.s-tip { margin-top: 10px; padding-top: 10px; border-top: 1px solid var(–border); font-size: 0.75rem; color: var(–muted); line-height: 1.6; font-style: italic; }
.s-tip::before { content: ’💡 ’; font-style: normal; }

/* WEEK KM SUMMARY */
.km-summary { display: flex; gap: 6px; margin-bottom: 10px; flex-wrap: wrap; }
.km-pill { font-family: ‘Barlow Condensed’, sans-serif; font-size: 0.68rem; font-weight: 600; padding: 4px 10px; border-radius: 20px; background: var(–card2); border: 1px solid var(–border2); color: var(–muted); letter-spacing: 0.5px; }
.km-pill.kp-done { color: var(–green); border-color: rgba(61,255,160,0.3); }

/* GYM CARD */
.gym-card { background: var(–card2); border: 1px solid var(–border2); border-radius: 12px; padding: 14px; margin-bottom: 8px; }
.gym-header { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
.gym-title { font-family: ‘Barlow Condensed’, sans-serif; font-size: 0.9rem; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(–blue); }
.gym-sub { font-size: 0.65rem; color: var(–muted); margin-left: auto; font-family: ‘Barlow Condensed’, sans-serif; }
.gym-section { font-family: ‘Barlow Condensed’, sans-serif; font-size: 0.6rem; letter-spacing: 1.5px; text-transform: uppercase; color: var(–muted2); margin: 8px 0 5px; }
.gym-ex { margin-bottom: 6px; }
.gym-ex-name { font-size: 0.8rem; font-weight: 500; color: var(–text); font-family: ‘Literata’, Georgia, serif; }
.gym-ex-detail { font-size: 0.68rem; color: var(–muted); margin-top: 1px; font-family: ‘Literata’, Georgia, serif; }

/* RACE BANNER */
.race-banner { background: linear-gradient(135deg, rgba(255,76,106,0.1), rgba(255,228,74,0.07)); border: 1px solid rgba(255,76,106,0.35); border-radius: 14px; padding: 18px; text-align: center; margin-bottom: 8px; }
.race-emoji { font-size: 2rem; display: block; margin-bottom: 6px; }
.race-title { font-family: ‘Barlow Condensed’, sans-serif; font-size: 2rem; font-weight: 900; letter-spacing: 3px; color: var(–red); line-height: 1; margin-bottom: 6px; }
.race-sub { font-size: 0.78rem; color: var(–muted); margin-bottom: 12px; line-height: 1.6; }
.race-tick { width: 44px; height: 44px; border-radius: 50%; border: 2px solid rgba(255,76,106,0.4); background: transparent; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; margin: 0 auto; transition: all 0.2s; color: var(–muted); }
.race-tick:hover { border-color: var(–red); color: var(–red); }
.race-tick.ticked { background: var(–red); border-color: var(–red); color: white; }

/* PREHAB */
.prehab-intro { background: var(–card); border: 1px solid var(–border); border-radius: 14px; padding: 16px; margin-bottom: 14px; }
.prehab-intro h2 { font-family: ‘Barlow Condensed’, sans-serif; font-size: 1.4rem; font-weight: 900; letter-spacing: 1px; color: var(–blue); margin-bottom: 6px; }
.prehab-intro p { font-size: 0.8rem; color: #c0c8d8; line-height: 1.65; }
.prehab-section { font-family: ‘Barlow Condensed’, sans-serif; font-size: 0.65rem; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; color: var(–muted); margin: 16px 0 8px; }
.ex-card { background: var(–card); border: 1px solid var(–border); border-radius: 12px; padding: 14px; margin-bottom: 8px; }
.ex-card-top { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 8px; }
.ex-icon { font-size: 1.3rem; width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; background: var(–card2); border-radius: 8px; flex-shrink: 0; }
.ex-title { font-size: 0.88rem; font-weight: 500; line-height: 1.2; }
.ex-sets { font-family: ‘Barlow Condensed’, sans-serif; font-size: 0.7rem; color: var(–blue); font-weight: 600; margin-top: 2px; }
.ex-priority { margin-left: auto; flex-shrink: 0; font-family: ‘Barlow Condensed’, sans-serif; font-size: 0.58rem; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; padding: 2px 7px; border-radius: 4px; }
.p-critical { background: rgba(255,76,106,0.15); color: var(–red); }
.p-high { background: rgba(255,228,74,0.12); color: var(–yellow); }
.p-daily { background: rgba(61,255,160,0.1); color: var(–green); }
.ex-why { font-size: 0.75rem; color: var(–muted); line-height: 1.6; padding-top: 8px; border-top: 1px solid var(–border); font-style: italic; }
.ex-when { font-family: ‘Barlow Condensed’, sans-serif; font-size: 0.63rem; color: var(–muted2); margin-top: 5px; letter-spacing: 0.3px; }
.warning-box { background: var(–warn-bg); border: 1px solid rgba(255,76,106,0.3); border-radius: 12px; padding: 14px; margin-bottom: 14px; }
.warning-box h3 { font-family: ‘Barlow Condensed’, sans-serif; font-size: 1rem; font-weight: 700; letter-spacing: 1px; color: var(–red); margin-bottom: 8px; text-transform: uppercase; }
.warn-item { display: flex; gap: 8px; margin-bottom: 6px; font-size: 0.77rem; color: #ffb0b8; line-height: 1.5; }
.warn-item::before { content: ‘⚠’; flex-shrink: 0; }
.gym-schedule { background: var(–card); border: 1px solid var(–border); border-radius: 12px; padding: 14px; margin-bottom: 8px; }
.gym-schedule h3 { font-family: ‘Barlow Condensed’, sans-serif; font-size: 1rem; font-weight: 700; letter-spacing: 1px; color: var(–blue); margin-bottom: 10px; text-transform: uppercase; }
.gs-day { margin-bottom: 10px; }
.gs-label { font-family: ‘Barlow Condensed’, sans-serif; font-size: 0.72rem; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(–yellow); margin-bottom: 4px; }
.gs-items { font-size: 0.78rem; color: #c0c8d8; line-height: 1.8; }
</style>

</head>
<body>

<div class="header">
  <div class="header-top">
    <div class="brand">
      <h1>Sub-20 5K</h1>
      <p>18 Weeks · 4 Sessions · Injury Smart</p>
    </div>
    <div class="header-meta">
      <div class="race-countdown">
        <div class="days" id="daysLeft">—</div>
        <div class="days-lbl">to race</div>
      </div>
      <div class="progress-wrap">
        <svg viewBox="0 0 42 42">
          <circle class="ring-bg" cx="21" cy="21" r="17"/>
          <circle class="ring-bar" id="ringBar" cx="21" cy="21" r="17" stroke-dasharray="106.8" stroke-dashoffset="106.8"/>
          <text class="ring-text" id="ringPct" x="21" y="21">0%</text>
        </svg>
      </div>
    </div>
  </div>
  <div class="tabs">
    <button class="tab active" onclick="switchTab('overview')">Overview</button>
    <button class="tab" onclick="switchTab('week')">This Week</button>
    <button class="tab" onclick="switchTab('prehab')">Prehab</button>
  </div>
</div>

<main>
  <div class="view active" id="tab-overview"></div>
  <div class="view" id="tab-week"></div>
  <div class="view" id="tab-prehab"></div>
</main>

<script>
// ─── DATES ───────────────────────────────────────────────────
const START = new Date('2026-03-09');
const RACE  = new Date('2026-06-28');

function weekStart(n) { const d = new Date(START); d.setDate(d.getDate()+(n-1)*7); return d; }
function fmt(d) { return d.toLocaleDateString('en-GB',{day:'numeric',month:'short'}); }
function weekRange(n) { const s=weekStart(n); const e=new Date(s); e.setDate(e.getDate()+6); return fmt(s)+' – '+fmt(e); }

// ─── PLAN DATA ────────────────────────────────────────────────
// Every week has exactly 4 sessions: Tue, Wed, Fri, Sun
// Verified totals: Tue.km + Wed.km + Fri.km + Sun.km = totalKm (±0.5)
const WEEKS = [
 // ══ PHASE 1: BASE ══ Weeks 1-5 ══ Tempo only, no intervals yet ══
 { n:1, phase:'base', focus:'Aerobic Foundation', totalKm:32, cutback:false,
   injuryFlag:null,
   note:'First week of the plan. <strong>Tempo-only</strong> — no intervals yet. This protects your post-tib from the reactive load of speed work before it\'s ready. Easy days must be genuinely easy: you should be able to hold a full conversation. Wednesday is optional — do it if you can, skip it freely if not.',
   sessions:[
     {day:'Tuesday',  type:'tempo', workout:'W/U 1.5km · 20 min @4:40/km · C/D 1.5km', km:7.5, optional:false, tip:'4:40/km is comfortably hard — about 6/10 effort. You should be able to say 3-4 words but not a sentence. Always include the warm-up and cool-down jog.'},
     {day:'Wednesday',type:'easy',  workout:'8–10 km easy (club run or solo)', km:9, optional:true,  tip:'Genuinely easy. Club 10km if you can make it; solo run or skip entirely if not. Never push pace on this run — it\'s recovery mileage.'},
     {day:'Friday',   type:'easy',  workout:'6 km easy', km:6, optional:false, tip:'Easy run to keep legs moving between sessions. Conversational pace. No effort at all.'},
     {day:'Sunday',   type:'long',  workout:'10 km easy', km:10, optional:false, tip:'Relaxed long run. Same effort as Wednesday — time on feet is what matters, not pace.'}
   ]},
 { n:2, phase:'base', focus:'Building the Base', totalKm:34, cutback:false,
   injuryFlag:null,
   note:'Marginal progressions across every session. The tempo gets slightly longer, the long run grows by 1km. These small steps compound over 18 weeks into real fitness. <strong>Keep Wednesday genuinely easy</strong> — it\'s aerobic top-up mileage, not a workout.',
   sessions:[
     {day:'Tuesday',  type:'tempo', workout:'W/U 1.5km · 22 min @4:38/km · C/D 1.5km', km:8, optional:false, tip:'2 minutes longer and marginally faster than week 1. Pace it evenly — no surges at the end.'},
     {day:'Wednesday',type:'easy',  workout:'8–10 km easy (optional)', km:9, optional:true,  tip:'Optional club run or solo easy. Skip if legs feel heavy.'},
     {day:'Friday',   type:'easy',  workout:'6 km easy', km:6, optional:false, tip:'Easy run. Use this to check in with how your shins and ankles feel — useful feedback early in the plan.'},
     {day:'Sunday',   type:'long',  workout:'11 km easy', km:11, optional:false, tip:'1km further than last week. Consistent long-run progression is your biggest aerobic investment.'}
   ]},
 { n:3, phase:'base', focus:'First Interval Session', totalKm:33, cutback:false,
   injuryFlag:'First interval week. Your post-tib is most vulnerable when introducing speed work after a period without it. <strong>If you feel any tenderness behind the inner ankle before or during Tuesday\'s session, replace it with an easy run.</strong> Do not push through post-tib discomfort.',
   note:'<strong>Intervals arrive — treat this session with respect.</strong> 400m reps are short enough to limit tendon overload while introducing the neuromuscular stimulus you need. Run them at 4:05/km, not faster. Friday drops to easy-only to balance the new load. Check in carefully with how your legs feel on Wednesday.',

// ─── STATE ───────────────────────────────────────────────────
let completed = {};
try {
  const stored = localStorage.getItem('sub20v4');
  if (stored) completed = JSON.parse(stored);
} catch(e) { completed = {}; }
function save() { try { localStorage.setItem('sub20v4', JSON.stringify(completed)); } catch(e) {} }
function sKey(wn, si) { return 'w' + wn + 's' + si; }
function isDone(wn, si) {
  const val = completed[sKey(wn, si)];
  return val === true;
}
function toggle(wn, si) {
  const k = sKey(wn, si);
  if (isDone(wn, si)) {
    delete completed[k];
  } else {
    completed[k] = true;
  }
  save(); updateRing(); render();
}
function totalSessions() { return WEEKS.reduce((a,w) => a + w.sessions.length, 0); }
function doneSessions()  { return Object.values(completed).filter(Boolean).length; }
function currentWeek() {
  for (let i=0; i<WEEKS.length; i++) {
    if (!WEEKS[i].sessions.every((_,si) => isDone(i+1,si))) return i+1;
  }
  return 18;
}

// ─── RING & COUNTDOWN ────────────────────────────────────────
function updateRing() {
  const pct = Math.round(doneSessions()/totalSessions()*100);
  const circ = 106.8;
  document.getElementById('ringBar').style.strokeDashoffset = circ - circ*pct/100;
  document.getElementById('ringPct').textContent = pct+'%';
}
function updateCountdown() {
  const diff = Math.ceil((RACE - new Date()) / 86400000);
  document.getElementById('daysLeft').textContent = diff > 0 ? diff : '🏁';
}

// ─── TAB SWITCHING ───────────────────────────────────────────
let activeTab = 'overview';
let selWeek = null;

function switchTab(tab, wn) {
  activeTab = tab;
  if (wn) selWeek = wn;
  if (tab === 'week' && !selWeek) selWeek = currentWeek();
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', ['overview','week','prehab'][i]===tab));
  ['overview','week','prehab'].forEach(t => document.getElementById('tab-'+t).classList.toggle('active', t===tab));
  render();
}

function render() {
  if (activeTab==='overview') renderOverview();
  else if (activeTab==='week') renderWeek(selWeek);
  else renderPrehab();
}

// ─── OVERVIEW ────────────────────────────────────────────────
function renderOverview() {
  const cw = currentWeek();
  let html = `<div class="stat-strip">
    <div class="stat-box"><div class="v">${doneSessions()}</div><div class="l">Done</div></div>
    <div class="stat-box"><div class="v">${cw}</div><div class="l">Week</div></div>
    <div class="stat-box"><div class="v">${Math.max(0,19-cw)}</div><div class="l">Left</div></div>
    <div class="stat-box"><div class="v">18</div><div class="l">Total</div></div>
  </div>`;

  let lastPhase = '';
  WEEKS.forEach(w => {
    if (w.phase !== lastPhase) {
      const p = PHASES[w.phase];
      html += `<div class="phase-header">
        <div class="phase-pip" style="background:${p.color}"></div>
        <span class="phase-name" style="color:${p.color}">${p.label}</span>
        <div class="phase-line"></div>
      </div>`;
      lastPhase = w.phase;
    }
    const allDone = w.sessions.every((_,si) => isDone(w.n,si));
    const isCur   = w.n === currentWeek() && !allDone;
    const dots = w.sessions.map((s,si) => {
      const d = isDone(w.n,si) ? ' done' : '';
      return `<div class="dot d-${s.type}${d}"></div>`;
    }).join('');
    html += `<div class="week-row ${allDone?'wk-done':''} ${isCur?'wk-current':''}" onclick="switchTab('week',${w.n})">
      <div class="wk-num">${w.n<10?'0'+w.n:w.n}</div>
      <div class="wk-info">
        <div class="wk-focus">${w.focus}${w.cutback?'<span class="cutback-badge">Recovery</span>':''}</div>
        <div class="wk-meta">${weekRange(w.n)}</div>
      </div>
      <div class="wk-right">
        <div class="wk-km">${w.totalKm} km</div>
        <div class="wk-dots">${dots}</div>
      </div>
      <div class="wk-chevron">›</div>
    </div>`;
  });
  document.getElementById('tab-overview').innerHTML = html;
}

// ─── WEEK DETAIL ─────────────────────────────────────────────
function renderWeek(wn) {
  const w = WEEKS[wn-1];
  const pc = PHASES[w.phase].color;
  const pl = PHASES[w.phase].label;

  // km pill breakdown
  const kmDone = w.sessions.reduce((a,s,si) => a + (isDone(wn,si) ? s.km : 0), 0);
  const kmPills = w.sessions.map((s,si) => {
    const d = isDone(wn,si);
    return `<div class="km-pill${d?' kp-done':''}">${s.day.slice(0,3)}: ${s.km}km</div>`;
  }).join('');

  let html = `
    <button class="back-btn" onclick="switchTab('overview')">‹ All Weeks</button>
    <div class="week-nav">
      <button class="nav-btn" onclick="switchTab('week',${wn-1})" ${wn===1?'disabled':''}>‹ Prev</button>
      <span class="nav-label">Week ${wn} / 18</span>
      <button class="nav-btn" onclick="switchTab('week',${wn+1})" ${wn===18?'disabled':''}>Next ›</button>
    </div>

    <div class="week-summary">
      <div class="ws-top">
        <div>
          <div class="ws-phase" style="color:${pc}">${pl}${w.cutback?' · Recovery':''}</div>
          <div class="ws-title">${w.focus}</div>
          <div class="ws-date">${weekRange(wn)}</div>
        </div>
        <div class="ws-km-big">
          <div class="km-val">${w.totalKm}</div>
          <div class="km-lbl">km target</div>
        </div>
      </div>
      <div class="coach-note">${w.note}</div>
    </div>

    <div class="km-summary">${kmPills}</div>`;

  if (w.injuryFlag) {
    html += `<div class="injury-flag"><div class="flag-icon">⚠️</div><div class="flag-text">${w.injuryFlag}</div></div>`;
  }

  w.sessions.forEach((s,si) => {
    const done = isDone(wn,si);
    if (s.type === 'race') {
      html += `<div class="race-banner">
        <span class="race-emoji">🏁</span>
        <div class="race-title">RACE DAY</div>
        <div class="race-sub">${s.workout}<br><br>${s.tip}</div>
        <button class="race-tick ${done?'ticked':''}" onclick="toggle(${wn},${si})">${done?'✓':'○'}</button>
      </div>`;
      return;
    }
    const typeLabel = s.type==='long' ? 'long run' : s.type;
    html += `<div class="session-card ${done?'s-done':''} ${s.optional?'s-optional':''}">
      <div class="s-top">
        <div class="s-left">
          <div class="s-badge-row">
            <span class="s-badge badge-${s.type==='long'?'long':s.type}">${typeLabel}</span>
            ${s.optional?'<span class="badge-opt">Optional</span>':''}
          </div>
          <div class="s-day">${s.day}</div>
          <div class="s-workout">${s.workout}</div>
          <div class="s-km-row">~${s.km} km this session</div>
        </div>
        <button class="tick-btn ${done?'ticked':''}" onclick="toggle(${wn},${si})">${done?'✓':'○'}</button>
      </div>
      <div class="s-tip">${s.tip}</div>
    </div>`;
  });

  // Gym summary card
  html += `<div class="gym-card">
    <div class="gym-header"><span>💪</span><span class="gym-title">Gym & Prehab This Week</span>
    <span class="gym-sub">${w.phase==='taper'?'Reduce weights 20%':'Full programme'}</span></div>
    <div class="gym-section">Tuesday &amp; Thursday — Full Body + Injury Prehab</div>
    <div class="gym-ex"><div class="gym-ex-name">Single-leg calf raises (straight + bent knee)</div><div class="gym-ex-detail">3×15 each leg, slow tempo — non-negotiable</div></div>
    <div class="gym-ex"><div class="gym-ex-name">Tibialis posterior band work</div><div class="gym-ex-detail">3×15 each leg — your single most important exercise</div></div>
    <div class="gym-ex"><div class="gym-ex-name">Single-leg Romanian deadlift</div><div class="gym-ex-detail">3×10 each leg — posterior chain strength</div></div>
    <div class="gym-section">Friday — Prehab Focus Session</div>
    <div class="gym-ex"><div class="gym-ex-name">Tibialis anterior band work</div><div class="gym-ex-detail">3×15 each leg — shin splint prevention</div></div>
    <div class="gym-ex"><div class="gym-ex-name">Foot doming / short foot exercise</div><div class="gym-ex-detail">10×5s holds each foot — arch rebuilding</div></div>
    <div class="gym-section">Daily — 5 Minutes Every Day</div>
    <div class="gym-ex"><div class="gym-ex-name">Soleus stretch (bent knee) + gastrocnemius stretch</div><div class="gym-ex-detail">3×45s each side, each stretch — every single day without exception</div></div>
    <div class="gym-ex"><div class="gym-ex-name">Tibialis posterior band work on sofa</div><div class="gym-ex-detail">3×15 each leg — evening routine while watching TV</div></div>
  </div>`;

  document.getElementById('tab-week').innerHTML = html;
}

// ─── PREHAB TAB ──────────────────────────────────────────────
function renderPrehab() {
  let html = `
    <div class="prehab-intro">
      <h2>Injury Prevention Plan</h2>
      <p>Built around your specific history: posterior tibial tendon dysfunction (likely partial tear/severe tendinopathy) and Achilles sensitivity. The post-tib band work and calf raises are non-negotiable — they\'re what gets you to the start line healthy.</p>
    </div>
    <div class="warning-box">
      <h3>🔴 Stop Running If You Have...</h3>
      <div class="warn-item">Sharp or aching pain behind the medial malleolus (inner ankle bone) during or after a run</div>
      <div class="warn-item">Pain that worsens during a run rather than warming up and settling within 5-10 min</div>
      <div class="warn-item">Visible swelling around the inside of the ankle</div>
      <div class="warn-item">Morning Achilles stiffness lasting more than 10-15 minutes</div>
      <div class="warn-item">Post-tib tenderness that doesn\'t settle within 24 hours of a run</div>
    </div>
    <div class="prehab-section">🔴 Critical — Every Gym Session</div>`;

  PREHAB_EXERCISES.filter(e=>e.priority==='critical').forEach(e => { html += exCard(e); });
  html += `<div class="prehab-section">🟡 High Priority — Weekly</div>`;
  PREHAB_EXERCISES.filter(e=>e.priority==='high').forEach(e => { html += exCard(e); });
  html += `<div class="prehab-section">🟢 Daily — 5 Minutes Every Day</div>`;
  PREHAB_EXERCISES.filter(e=>e.priority==='daily').forEach(e => { html += exCard(e); });

  html += `<div class="gym-schedule">
    <h3>📅 Weekly Gym Integration</h3>
    <div class="gs-day">
      <div class="gs-label">Tuesday & Thursday — Full Body</div>
      <div class="gs-items">Your existing full-body session<br>+ Single-leg calf raises (straight) 3×15<br>+ Single-leg calf raises (bent knee) 3×15<br>+ Post-tib band work 3×15<br>+ Single-leg RDL 3×10</div>
    </div>
    <div class="gs-day">
      <div class="gs-label">Friday — Everything Else + Prehab</div>
      <div class="gs-items">Your existing session<br>+ Tibialis anterior band work 3×15<br>+ Foot doming 10×5s holds<br>+ Soleus + gastroc stretches</div>
    </div>
    <div class="gs-day">
      <div class="gs-label">Daily — 5 Minutes (Sofa/Morning)</div>
      <div class="gs-items">Post-tib band work 3×15 each leg<br>Soleus stretch 3×45s each side<br>Gastrocnemius stretch 3×45s each side<br>Foot doming 10×5s each foot</div>
    </div>
  </div>`;

  document.getElementById('tab-prehab').innerHTML = html;
}

function exCard(e) {
  return `<div class="ex-card">
    <div class="ex-card-top">
      <div class="ex-icon">${e.icon}</div>
      <div style="flex:1"><div class="ex-title">${e.title}</div><div class="ex-sets">${e.sets}</div></div>
      <div class="ex-priority p-${e.priority}">${e.lab}</div>
    </div>
    <div class="ex-why">${e.why}</div>
    <div class="ex-when">📅 ${e.when}</div>
  </div>`;
}

// ─── INIT ────────────────────────────────────────────────────
updateRing();
updateCountdown();
setInterval(updateCountdown, 60000);
renderOverview();
</script>

</body>
</html>
