<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Sub-20 5K</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;900&family=Literata:ital,wght@0,400;0,500;1,400&display=swap');
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; }
body {
  background-color: #080c10;
  color: #e8edf5;
  font-family: 'Literata', Georgia, 'Times New Roman', serif;
  font-size: 15px;
  line-height: 1.5;
  overflow-x: hidden;
  padding-top: 90px;
}
#appHeader {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 999;
  background-color: #0d1117;
  border-bottom: 1px solid #1e2535;
  padding: 10px 16px 0;
}
.header-top { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 8px; }
.brand-title { font-family: 'Barlow Condensed','Arial Narrow',Arial,sans-serif; font-weight: 900; font-size: 1.5rem; letter-spacing: 3px; line-height: 1; color: #3dffa0; }
.brand-sub { font-family: 'Barlow Condensed','Arial Narrow',Arial,sans-serif; font-size: 0.6rem; color: #5a6a85; letter-spacing: 1.5px; text-transform: uppercase; margin-top: 2px; }
.header-right { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
.countdown-days { font-family: 'Barlow Condensed','Arial Narrow',Arial,sans-serif; font-size: 1.3rem; font-weight: 700; color: #ffe44a; line-height: 1; text-align: right; }
.countdown-lbl { font-family: 'Barlow Condensed','Arial Narrow',Arial,sans-serif; font-size: 0.55rem; color: #5a6a85; text-transform: uppercase; letter-spacing: 1px; text-align: right; }
.ring-wrap { width: 44px; height: 44px; flex-shrink: 0; }
.ring-wrap svg { width: 44px; height: 44px; display: block; }
.ring-bg { fill: none; stroke: #252d3e; stroke-width: 4; }
.ring-bar { fill: none; stroke: #3dffa0; stroke-width: 4; stroke-linecap: round; transform: rotate(-90deg); transform-origin: 50% 50%; transition: stroke-dashoffset 0.5s ease; }
.ring-label { font-family: 'Barlow Condensed','Arial Narrow',Arial,sans-serif; font-size: 10px; font-weight: 700; fill: #3dffa0; dominant-baseline: middle; text-anchor: middle; }
.tabs { display: flex; border-top: 1px solid #1e2535; margin: 0 -16px; }
.tab { flex: 1; padding: 9px 2px; text-align: center; font-family: 'Barlow Condensed','Arial Narrow',Arial,sans-serif; font-size: 0.68rem; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: #5a6a85; background: none; border: none; border-bottom: 2px solid transparent; cursor: pointer; transition: color 0.15s, border-color 0.15s; }
.tab.active { color: #3dffa0; border-bottom-color: #3dffa0; }
main { max-width: 540px; margin: 0 auto; padding: 14px 14px 80px; }
.view { display: none; }
.view.active { display: block; }

/* ── STAT STRIP ── */
.stat-strip { display: grid; grid-template-columns: repeat(4,1fr); gap: 8px; margin-bottom: 16px; }
.stat-box { background-color: #111620; border: 1px solid #1e2535; border-radius: 10px; padding: 10px 6px; text-align: center; }
.stat-val { font-family: ‘Barlow Condensed’,‘Arial Narrow’,Arial,sans-serif; font-size: 1.6rem; font-weight: 700; color: #3dffa0; line-height: 1; display: block; }
.stat-lbl { font-family: ‘Barlow Condensed’,‘Arial Narrow’,Arial,sans-serif; font-size: 0.58rem; color: #5a6a85; text-transform: uppercase; letter-spacing: 0.8px; margin-top: 2px; display: block; }

/* ── PHASE HEADER ── */
.phase-header { display: flex; align-items: center; gap: 8px; margin: 18px 0 8px; }
.phase-pip { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.phase-lbl { font-family: ‘Barlow Condensed’,‘Arial Narrow’,Arial,sans-serif; font-size: 0.68rem; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; }
.phase-rule { flex: 1; height: 1px; background-color: #1e2535; }

/* ── WEEK ROW ── */
.week-row { display: flex; align-items: center; gap: 10px; padding: 12px; background-color: #111620; border: 1px solid #1e2535; border-radius: 10px; margin-bottom: 6px; cursor: pointer; position: relative; overflow: hidden; -webkit-user-select: none; user-select: none; }
.week-row:active { background-color: #161c28; }
.week-row.wk-current { border-color: #3dffa0; }
.week-row.wk-current::before { content:’’; position:absolute; left:0; top:0; bottom:0; width:3px; background-color:#3dffa0; }
.week-row.wk-done { background-color: #0a1a12; border-color: #1e3a28; }
.wk-num { font-family: ‘Barlow Condensed’,‘Arial Narrow’,Arial,sans-serif; font-size: 1.2rem; font-weight: 700; color: #3a4a60; min-width: 28px; flex-shrink: 0; }
.week-row.wk-current .wk-num { color: #3dffa0; }
.week-row.wk-done .wk-num { color: #3dffa0; opacity: 0.5; }
.wk-info { flex: 1; min-width: 0; }
.wk-focus { font-size: 0.85rem; font-weight: 500; color: #e8edf5; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.wk-date { font-family: ‘Barlow Condensed’,‘Arial Narrow’,Arial,sans-serif; font-size: 0.65rem; color: #5a6a85; margin-top: 2px; }
.wk-right { display: flex; flex-direction: column; align-items: flex-end; gap: 5px; flex-shrink: 0; }
.wk-km { font-family: ‘Barlow Condensed’,‘Arial Narrow’,Arial,sans-serif; font-size: 0.78rem; font-weight: 600; color: #5a6a85; }
.wk-dots { display: flex; gap: 4px; }
.dot { width: 8px; height: 8px; border-radius: 50%; border: 1.5px solid #252d3e; background-color: transparent; }
.dot.d-interval { border-color: #ff7c3a; }
.dot.d-tempo    { border-color: #5b9fff; }
.dot.d-easy     { border-color: #2a5a40; }
.dot.d-long     { border-color: #ffe44a; }
.dot.d-race     { border-color: #ff4a6a; }
.dot.d-done     { background-color: #3dffa0; border-color: #3dffa0; }
.wk-arrow { color: #3a4a60; font-size: 1.1rem; flex-shrink: 0; }
.recovery-badge { display: inline-block; font-family: ‘Barlow Condensed’,‘Arial Narrow’,Arial,sans-serif; font-size: 0.58rem; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; padding: 2px 6px; border-radius: 4px; background-color: #1a2535; color: #5b9fff; border: 1px solid #253550; margin-left: 5px; vertical-align: middle; }

/* ── WEEK DETAIL ── */
.back-btn { display: inline-flex; align-items: center; gap: 4px; background: none; border: none; color: #5a6a85; font-family: ‘Barlow Condensed’,‘Arial Narrow’,Arial,sans-serif; font-size: 0.85rem; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; cursor: pointer; padding: 0; margin-bottom: 12px; }
.week-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; gap: 8px; }
.nav-btn { background-color: #111620; border: 1px solid #1e2535; color: #e8edf5; font-family: ‘Barlow Condensed’,‘Arial Narrow’,Arial,sans-serif; font-size: 0.8rem; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; padding: 8px 14px; border-radius: 8px; cursor: pointer; flex-shrink: 0; }
.nav-btn:disabled { opacity: 0.2; pointer-events: none; }
.nav-lbl { font-family: ‘Barlow Condensed’,‘Arial Narrow’,Arial,sans-serif; font-size: 0.9rem; font-weight: 700; letter-spacing: 2px; color: #5a6a85; text-transform: uppercase; text-align: center; }
.week-summary { background-color: #111620; border: 1px solid #1e2535; border-radius: 14px; padding: 16px; margin-bottom: 10px; }
.ws-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; margin-bottom: 10px; }
.ws-phase { font-family: ‘Barlow Condensed’,‘Arial Narrow’,Arial,sans-serif; font-size: 0.62rem; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 3px; }
.ws-title { font-family: ‘Barlow Condensed’,‘Arial Narrow’,Arial,sans-serif; font-size: 1.7rem; font-weight: 900; letter-spacing: 1px; line-height: 1; color: #e8edf5; }
.ws-date { font-family: ‘Barlow Condensed’,‘Arial Narrow’,Arial,sans-serif; font-size: 0.68rem; color: #5a6a85; margin-top: 4px; }
.ws-km { text-align: right; flex-shrink: 0; }
.ws-km-val { font-family: ‘Barlow Condensed’,‘Arial Narrow’,Arial,sans-serif; font-size: 2.2rem; font-weight: 900; color: #ffe44a; line-height: 1; }
.ws-km-lbl { font-family: ‘Barlow Condensed’,‘Arial Narrow’,Arial,sans-serif; font-size: 0.58rem; color: #5a6a85; text-transform: uppercase; letter-spacing: 1px; }
.coach-note { font-size: 0.8rem; color: #b0bcd0; line-height: 1.65; font-style: italic; padding-top: 10px; border-top: 1px solid #1e2535; }
.coach-note strong { font-style: normal; color: #3dffa0; font-weight: 600; }
.km-pills { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; }
.km-pill { font-family: ‘Barlow Condensed’,‘Arial Narrow’,Arial,sans-serif; font-size: 0.7rem; font-weight: 600; padding: 4px 10px; border-radius: 20px; background-color: #161c28; border: 1px solid #252d3e; color: #5a6a85; }
.km-pill.done { color: #3dffa0; border-color: #1e4a30; background-color: #0a1a12; }
.injury-flag { display: flex; gap: 10px; align-items: flex-start; background-color: #1a0e0a; border: 1px solid #4a2020; border-left: 3px solid #ff4a6a; border-radius: 10px; padding: 10px 12px; margin-bottom: 10px; }
.flag-icon { font-size: 1rem; flex-shrink: 0; margin-top: 1px; }
.flag-text { font-size: 0.75rem; color: #ffb0b8; line-height: 1.55; }
.flag-text strong { color: #ff4a6a; font-style: normal; }

/* ── SESSION CARDS ── */
.session-card { background-color: #111620; border: 1px solid #1e2535; border-radius: 12px; padding: 14px; margin-bottom: 8px; }
.session-card.s-done { background-color: #0a1a12; border-color: #1e3a28; opacity: 0.82; }
.session-card.s-optional { border-style: dashed; border-color: #252d3e; }
.s-row { display: flex; align-items: flex-start; gap: 10px; }
.s-body { flex: 1; min-width: 0; }
.s-badges { display: flex; align-items: center; gap: 6px; margin-bottom: 6px; flex-wrap: wrap; }
.s-badge { font-family: ‘Barlow Condensed’,‘Arial Narrow’,Arial,sans-serif; font-size: 0.62rem; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; padding: 2px 8px; border-radius: 4px; }
.badge-interval { background-color: #2a1a0a; color: #ff7c3a; border: 1px solid #4a2a10; }
.badge-tempo    { background-color: #0a1525; color: #5b9fff; border: 1px solid #152540; }
.badge-easy     { background-color: #0a1a12; color: #3dffa0; border: 1px solid #153525; }
.badge-long     { background-color: #1a1800; color: #ffe44a; border: 1px solid #3a3500; }
.badge-race     { background-color: #1a0a10; color: #ff4a6a; border: 1px solid #3a1020; }
.badge-opt { font-family: ‘Barlow Condensed’,‘Arial Narrow’,Arial,sans-serif; font-size: 0.6rem; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; color: #5a6a85; border: 1px solid #252d3e; padding: 2px 6px; border-radius: 4px; background-color: transparent; }
.s-day { font-family: ‘Barlow Condensed’,‘Arial Narrow’,Arial,sans-serif; font-size: 0.63rem; color: #5a6a85; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 3px; }
.s-workout { font-size: 0.88rem; font-weight: 500; color: #e8edf5; line-height: 1.4; }
.session-card.s-done .s-workout { text-decoration: line-through; color: #5a6a85; }
.s-km { font-family: ‘Barlow Condensed’,‘Arial Narrow’,Arial,sans-serif; font-size: 0.65rem; color: #5a6a85; margin-top: 4px; }
.tick-btn { width: 32px; height: 32px; border-radius: 50%; border: 2px solid #252d3e; background-color: transparent; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 0.9rem; color: #5a6a85; flex-shrink: 0; transition: all 0.15s; -webkit-appearance: none; }
.tick-btn.ticked { background-color: #3dffa0; border-color: #3dffa0; color: #080c10; font-weight: 700; }
.s-tip { margin-top: 10px; padding-top: 10px; border-top: 1px solid #1e2535; font-size: 0.75rem; color: #5a6a85; line-height: 1.6; font-style: italic; }
.s-tip::before { content: ’💡 ’; font-style: normal; }

/* ── GYM CARD ── */
.gym-card { background-color: #0f1420; border: 1px solid #1e2535; border-radius: 12px; padding: 14px; margin-bottom: 8px; }
.gym-head { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
.gym-head-title { font-family: ‘Barlow Condensed’,‘Arial Narrow’,Arial,sans-serif; font-size: 0.88rem; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: #5b9fff; }
.gym-head-sub { margin-left: auto; font-family: ‘Barlow Condensed’,‘Arial Narrow’,Arial,sans-serif; font-size: 0.65rem; color: #5a6a85; }
.gym-sec { font-family: ‘Barlow Condensed’,‘Arial Narrow’,Arial,sans-serif; font-size: 0.6rem; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: #3a4a60; margin: 10px 0 5px; padding-bottom: 3px; border-bottom: 1px solid #1e2535; }
.gym-item { margin-bottom: 6px; }
.gym-item-name { font-size: 0.82rem; font-weight: 500; color: #e8edf5; font-family: ‘Literata’, Georgia, serif; }
.gym-item-detail { font-size: 0.7rem; color: #5a6a85; margin-top: 1px; font-family: ‘Literata’, Georgia, serif; }

/* ── RACE BANNER ── */
.race-banner { background-color: #1a0a10; border: 1px solid #4a1020; border-radius: 14px; padding: 20px; text-align: center; margin-bottom: 8px; }
.race-emoji { font-size: 2rem; display: block; margin-bottom: 6px; }
.race-title { font-family: ‘Barlow Condensed’,‘Arial Narrow’,Arial,sans-serif; font-size: 2.2rem; font-weight: 900; letter-spacing: 4px; color: #ff4a6a; line-height: 1; margin-bottom: 8px; }
.race-sub { font-size: 0.8rem; color: #8a7a85; line-height: 1.6; margin-bottom: 14px; }
.race-tick { width: 46px; height: 46px; border-radius: 50%; border: 2px solid #4a1020; background-color: transparent; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1.3rem; color: #5a6a85; margin: 0 auto; -webkit-appearance: none; }
.race-tick.ticked { background-color: #ff4a6a; border-color: #ff4a6a; color: white; }

/* ── PREHAB TAB ── */
.prehab-intro { background-color: #111620; border: 1px solid #1e2535; border-radius: 14px; padding: 16px; margin-bottom: 12px; }
.prehab-intro h2 { font-family: ‘Barlow Condensed’,‘Arial Narrow’,Arial,sans-serif; font-size: 1.4rem; font-weight: 900; letter-spacing: 1px; color: #5b9fff; margin-bottom: 6px; }
.prehab-intro p { font-size: 0.8rem; color: #b0bcd0; line-height: 1.65; }
.prehab-sec-label { font-family: ‘Barlow Condensed’,‘Arial Narrow’,Arial,sans-serif; font-size: 0.65rem; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: #5a6a85; margin: 16px 0 8px; }
.ex-card { background-color: #111620; border: 1px solid #1e2535; border-radius: 12px; padding: 14px; margin-bottom: 8px; }
.ex-card-top { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 8px; }
.ex-icon { font-size: 1.2rem; width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; background-color: #161c28; border-radius: 8px; flex-shrink: 0; }
.ex-info { flex: 1; }
.ex-title { font-size: 0.88rem; font-weight: 500; color: #e8edf5; line-height: 1.3; }
.ex-sets { font-family: ‘Barlow Condensed’,‘Arial Narrow’,Arial,sans-serif; font-size: 0.7rem; color: #5b9fff; font-weight: 600; margin-top: 2px; }
.ex-badge { flex-shrink: 0; font-family: ‘Barlow Condensed’,‘Arial Narrow’,Arial,sans-serif; font-size: 0.58rem; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; padding: 2px 7px; border-radius: 4px; }
.ex-badge.critical { background-color: #2a0a10; color: #ff4a6a; }
.ex-badge.high     { background-color: #1a1800; color: #ffe44a; }
.ex-badge.daily    { background-color: #0a1a12; color: #3dffa0; }
.ex-why { font-size: 0.75rem; color: #5a6a85; line-height: 1.6; font-style: italic; padding-top: 8px; border-top: 1px solid #1e2535; }
.ex-when { font-family: ‘Barlow Condensed’,‘Arial Narrow’,Arial,sans-serif; font-size: 0.65rem; color: #3a4a60; margin-top: 5px; }
.warn-box { background-color: #1a0e0a; border: 1px solid #4a2020; border-radius: 12px; padding: 14px; margin-bottom: 12px; }
.warn-box h3 { font-family: ‘Barlow Condensed’,‘Arial Narrow’,Arial,sans-serif; font-size: 1rem; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: #ff4a6a; margin-bottom: 8px; }
.warn-item { display: flex; gap: 8px; margin-bottom: 6px; font-size: 0.78rem; color: #ffb0b8; line-height: 1.5; }
.warn-item::before { content: ‘⚠’; flex-shrink: 0; }
.gym-sched { background-color: #111620; border: 1px solid #1e2535; border-radius: 12px; padding: 14px; margin-bottom: 8px; }
.gym-sched h3 { font-family: ‘Barlow Condensed’,‘Arial Narrow’,Arial,sans-serif; font-size: 1rem; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: #5b9fff; margin-bottom: 10px; }
.gs-day { margin-bottom: 10px; }
.gs-day-label { font-family: ‘Barlow Condensed’,‘Arial Narrow’,Arial,sans-serif; font-size: 0.72rem; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: #ffe44a; margin-bottom: 4px; }
.gs-day-items { font-size: 0.78rem; color: #b0bcd0; line-height: 1.8; }

/* ── TODAY TAB ── */
.today-header {
background-color: #111620;
border: 1px solid #1e2535;
border-radius: 14px;
padding: 16px;
margin-bottom: 12px;
display: flex;
align-items: flex-start;
justify-content: space-between;
gap: 12px;
}
.today-date-block {}
.today-dayname {
font-family: ‘Barlow Condensed’,‘Arial Narrow’,Arial,sans-serif;
font-size: 2rem;
font-weight: 900;
color: #3dffa0;
line-height: 1;
letter-spacing: 2px;
}
.today-datestr {
font-family: ‘Barlow Condensed’,‘Arial Narrow’,Arial,sans-serif;
font-size: 0.7rem;
color: #5a6a85;
letter-spacing: 1px;
margin-top: 3px;
}
.today-week-badge {
background-color: #161c28;
border: 1px solid #252d3e;
border-radius: 8px;
padding: 8px 12px;
text-align: right;
flex-shrink: 0;
}
.today-week-badge .wbig {
font-family: ‘Barlow Condensed’,‘Arial Narrow’,Arial,sans-serif;
font-size: 1.4rem;
font-weight: 900;
color: #ffe44a;
line-height: 1;
}
.today-week-badge .wsmall {
font-family: ‘Barlow Condensed’,‘Arial Narrow’,Arial,sans-serif;
font-size: 0.58rem;
color: #5a6a85;
text-transform: uppercase;
letter-spacing: 1px;
}
.streak-bar {
background-color: #111620;
border: 1px solid #1e2535;
border-radius: 12px;
padding: 12px 14px;
margin-bottom: 12px;
display: flex;
align-items: center;
gap: 12px;
}
.streak-flame { font-size: 1.4rem; flex-shrink: 0; }
.streak-text { flex: 1; }
.streak-num {
font-family: ‘Barlow Condensed’,‘Arial Narrow’,Arial,sans-serif;
font-size: 1.3rem;
font-weight: 900;
color: #ff7c3a;
line-height: 1;
}
.streak-lbl {
font-family: ‘Barlow Condensed’,‘Arial Narrow’,Arial,sans-serif;
font-size: 0.65rem;
color: #5a6a85;
letter-spacing: 0.5px;
margin-top: 1px;
}
.streak-dots { display: flex; gap: 4px; flex-shrink: 0; }
.sd { width: 9px; height: 9px; border-radius: 50%; background-color: #1e2535; }
.sd.on { background-color: #ff7c3a; }
.sd.today-on { background-color: #3dffa0; }
.rest-day-card {
background-color: #111620;
border: 1px solid #1e2535;
border-radius: 14px;
padding: 20px 16px;
text-align: center;
margin-bottom: 12px;
}
.rest-day-icon { font-size: 2rem; display: block; margin-bottom: 8px; }
.rest-day-title {
font-family: ‘Barlow Condensed’,‘Arial Narrow’,Arial,sans-serif;
font-size: 1.5rem;
font-weight: 900;
letter-spacing: 2px;
color: #5a6a85;
margin-bottom: 6px;
}
.rest-day-sub { font-size: 0.8rem; color: #3a4a60; line-height: 1.6; }
.today-section-label {
font-family: ‘Barlow Condensed’,‘Arial Narrow’,Arial,sans-serif;
font-size: 0.65rem;
font-weight: 700;
letter-spacing: 2px;
text-transform: uppercase;
color: #5a6a85;
margin: 14px 0 8px;
}
/* Prehab checklist item */
.prehab-check-item {
display: flex;
align-items: flex-start;
gap: 10px;
padding: 11px 12px;
background-color: #111620;
border: 1px solid #1e2535;
border-radius: 10px;
margin-bottom: 6px;
cursor: pointer;
-webkit-user-select: none;
user-select: none;
transition: background-color 0.15s;
}
.prehab-check-item.checked {
background-color: #0a1a12;

  var d = new Date(date); d.setHours(0,0,0,0);

  var wn = Math.floor(diff / 7) + 1;
  return Math.min(wn, 18);
}

  base:    {label:'Base Building', color:'#3dffa0'},

// ── STATE ──
var completed = {};
var prehabDone = {}; // key: 'YYYY-MM-DD:itemId'
var streakData = {}; // key: 'YYYY-MM-DD' = true if all prehab done that day

try { var s = localStorage.getItem('sub20v6'); if (s) { var parsed = JSON.parse(s); completed = parsed.completed||{}; prehabDone = parsed.prehabDone||{}; streakData = parsed.streakData||{}; } } catch(e) {}

function save() {
  try { localStorage.setItem('sub20v6', JSON.stringify({completed:completed, prehabDone:prehabDone, streakData:streakData})); } catch(e) {}
}
function sKey(wn,si) { return 'w'+wn+'s'+si; }
function isDone(wn,si) { return completed[sKey(wn,si)]===true; }
function toggle(wn,si) {
  var k=sKey(wn,si);
  if (isDone(wn,si)) { delete completed[k]; } else { completed[k]=true; }
  save(); updateRing(); render();
}
function totalSessions() { return WEEKS.reduce(function(a,w){return a+w.sessions.length;},0); }
function doneSessions()  { return Object.keys(completed).filter(function(k){return completed[k]===true;}).length; }
function currentWeek() {
  for (var i=0;i<WEEKS.length;i++) {
    if (!WEEKS[i].sessions.every(function(_,si){return isDone(i+1,si);})) return i+1;
  }
  return 18;
}

// ── PREHAB TICK ──
function todayStr() {
  var now = new Date();
  return now.getFullYear()+'-'+(now.getMonth()+1<10?'0':'')+(now.getMonth()+1)+'-'+(now.getDate()<10?'0':'')+now.getDate();
}
function phKey(itemId) { return todayStr()+':'+itemId; }
function isPrehDone(itemId) { return prehabDone[phKey(itemId)]===true; }
function togglePrehab(itemId, dayName) {
  var k = phKey(itemId);
  if (prehabDone[k]) { delete prehabDone[k]; } else { prehabDone[k]=true; }
  // check if all today's prehab is done
  var todayItems = getPrehab(dayName);
  var allDone = todayItems.every(function(p){ return prehabDone[todayStr()+':'+p.id]===true; });
  if (allDone) { streakData[todayStr()]=true; } else { delete streakData[todayStr()]; }
  save(); render();
}

// ── STREAK ──
function calcStreak() {
  var streak = 0;
  var d = new Date(); d.setHours(0,0,0,0);
  while (true) {
    var key = d.getFullYear()+'-'+(d.getMonth()+1<10?'0':'')+(d.getMonth()+1)+'-'+(d.getDate()<10?'0':'')+d.getDate();
    if (!streakData[key]) break;
    streak++;
    d.setDate(d.getDate()-1);
  }
  return streak;
}

// ── RING & COUNTDOWN ──
function updateRing() {
  var pct = Math.round(doneSessions()/totalSessions()*100);
  var circ = 113.1;
  document.getElementById('ringBar').style.strokeDashoffset = circ - circ*pct/100;
  document.getElementById('ringPct').textContent = pct+'%';
}
function updateCountdown() {
  var diff = Math.ceil((RACE - new Date()) / 86400000);
  document.getElementById('daysLeft').textContent = diff > 0 ? diff : '\uD83C\uDFC1';
}

// ── TABS ──
var activeTab = 'today';
var selWeek = null;

function switchTab(tab, wn) {
  activeTab = tab;
  if (wn) selWeek = wn;
  if (tab === 'week' && !selWeek) selWeek = currentWeek();
  document.querySelectorAll('.tab').forEach(function(t,i) {
    t.classList.toggle('active', ['today','overview','week','prehab'][i]===tab);
  });
  ['today','overview','week','prehab'].forEach(function(t) {
    document.getElementById('tab-'+t).classList.toggle('active', t===tab);
  });
  window.scrollTo(0,0);
  render();
}

function render() {
  if (activeTab==='today') renderToday();
  else if (activeTab==='overview') renderOverview();
  else if (activeTab==='week') renderWeek(selWeek);
  else renderPrehab();
}
